name: "Code check"

on:
  push:
    branches:
      - "main"

  workflow_call:

  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "composer.json"
      - "ecs.php"
      - "extension-ecs.php"
      - "rector.php"
      - "extension-rector.php"
      - "phpstan.neon"
      - "phpstan-baseline.neon"
      - "phpunit.xml"

concurrency:
  group: conventions-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code:
    name: "Code check"
    strategy:
      matrix:
        phpVersion: [ "8.3", "8.4", "8.5" ]
    uses: wrk-flow/reusable-workflows/.github/workflows/php-check.yml@76f74c71e1af04b4cb99ddf50166498bd3ea6a4e
    with:
      phpVersion: "${{ matrix.phpVersion }}"
    secrets: inherit

  tests:
    name: "Run tests"
    strategy:
      matrix:
        phpVersion: [ "8.3", "8.4", "8.5" ]
    uses: wrk-flow/reusable-workflows/.github/workflows/php-tests.yml@76f74c71e1af04b4cb99ddf50166498bd3ea6a4e
    with:
      gistOnPhpVersion: "8.3"
      gistID: 0b0340bf7e806524a632347d0b9219ea
      phpVersion: "${{ matrix.phpVersion }}"
    secrets: inherit

